kind = "web"
previewPath = "/"
title = "Web Studio Landing Page"
version = "1.0.0"
id = "artifacts/webstudio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23466
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/webstudio run dev"

[services.env]
PORT = "23466"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/webstudio", "run", "build"]
publicDir = "artifacts/webstudio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
